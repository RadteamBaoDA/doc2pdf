# Apply with the repository config's per-file/path rule mechanism.
# Values here are deliberately explicit so acceptance runs are reproducible.
cases:
  excel_printareas_shapes:
    excel:
      print_area_policy: preserve
      row_dimensions: 0
      orientation: landscape
      min_shrink_factor: 0.8
      oversized_action: error
    trim:
      enabled: true
      box_mode: physical
      margin: 10
  excel_chunks:
    excel:
      print_area_policy: auto
      row_dimensions: 10
      min_shrink_factor: 0.8
      oversized_action: error
  excel_max_width:
    excel:
      print_area_policy: auto
      row_dimensions: null
      min_shrink_factor: 0.05
      oversized_action: error
  excel_oversized_error:
    excel:
      print_area_policy: auto
      min_shrink_factor: 0.8
      oversized_action: error
  excel_oversized_skip:
    excel:
      print_area_policy: auto
      min_shrink_factor: 0.8
      oversized_action: skip
  excel_empty_shapes:
    excel:
      print_area_policy: auto
      row_dimensions: 0
      min_shrink_factor: 0.8
      oversized_action: error
  excel_quality_pagination:
    excel:
      print_area_policy: preserve
      row_dimensions: 0
      orientation: auto
      min_shrink_factor: 0.9
      oversized_action: paginate
      print_title_rows: "$1:$1"
      print_title_columns: "$A:$A"
